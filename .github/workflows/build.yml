name: Build PSWindowsUpdate

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Initialize MSVC build tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual Studio with VC tools not found" }

          $devCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $devCmd)) { throw "VsDevCmd.bat not found: $devCmd" }

          cmd /c "`"$devCmd`" -arch=x64 -host_arch=x64 && set" |
            ForEach-Object {
              if ($_ -match "^(.*?)=(.*)$") {
                $name  = $Matches[1]
                $value = $Matches[2]
                [System.Environment]::SetEnvironmentVariable($name, $value, "Process")
                # Persist to subsequent steps via GITHUB_ENV
                Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
              }
            }

          where.exe cl
          where.exe midl

      - name: Generate BITSReference4_0.dll
        shell: powershell
        run: |
          # Locate the latest Windows 10 SDK
          $sdkBase = "C:\Program Files (x86)\Windows Kits\10"
          if (-not (Test-Path "$sdkBase\Include")) {
            throw "Windows 10 SDK not found at $sdkBase"
          }
          $sdkVersion = (Get-Item "$sdkBase\Include\*" |
                         Sort-Object Name -Descending |
                         Select-Object -First 1).Name
          if ([string]::IsNullOrEmpty($sdkVersion)) {
            throw "No Windows SDK version directory found under $sdkBase\Include"
          }
          Write-Host "Windows SDK version: $sdkVersion"

          $tempDir = "$env:TEMP\BITSTEMPDIR"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null

          # Run MIDL to produce the bits4_0.tlb type library.
          # GitHub-hosted Windows runners are always x64.
          $midl     = "$sdkBase\bin\$sdkVersion\x64\midl.exe"
          $idlDir   = "$sdkBase\Include\$sdkVersion\um"
          $shareDir = "$sdkBase\Include\$sdkVersion\shared"

          # Use cl.exe from the VS DevCmd PATH to avoid space issues with the full path.
          $null = Get-Command cl.exe -ErrorAction Stop

          Push-Location $idlDir
          & $midl /cpp_cmd cl.exe /I $shareDir /out $tempDir bits4_0.idl `
                  /dlldata NUL /header NUL /iid NUL /proxy NUL
          if ($LASTEXITCODE -ne 0) { throw "MIDL failed with exit code $LASTEXITCODE" }
          Pop-Location

          # Locate tlbimp.exe from the .NET Framework SDK tools directory,
          # which is a well-known path and faster than a full VS tree search.
          $tlbimp = Get-ChildItem `
                      -Path "${env:ProgramFiles(x86)}\Microsoft SDKs\Windows" `
                      -Filter "tlbimp.exe" -Recurse -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -match "NETFX" -and
                                   $_.FullName -notmatch "\\arm" } |
                    Sort-Object { $_.FullName } -Descending |
                    Select-Object -First 1

          if (-not $tlbimp) {
            throw "tlbimp.exe not found under ${env:ProgramFiles(x86)}\Microsoft SDKs\Windows"
          }
          Write-Host "Using tlbimp: $($tlbimp.FullName)"

          # Convert the TLB to a .NET interop assembly
          & $tlbimp.FullName "$tempDir\bits4_0.tlb" /out:"$tempDir\BITSReference4_0.dll"
          if ($LASTEXITCODE -ne 0) { throw "TLBIMP failed with exit code $LASTEXITCODE" }

          # Copy next to the project so MSBuild's ResolveAssemblyReference can find it
          $projectPath = Join-Path $env:GITHUB_WORKSPACE "PSWindowsUpdate.csproj"
          if (-not (Test-Path $projectPath)) { throw "Project file not found at $projectPath" }

          $projectDir = Split-Path -Parent $projectPath
          $dllTargetDir = Join-Path $projectDir "lib"
          New-Item -ItemType Directory -Force -Path $dllTargetDir | Out-Null

          $targetPath = Join-Path $dllTargetDir "BITSReference4_0.dll"
          Copy-Item "$tempDir\BITSReference4_0.dll" $targetPath -Force
          Test-Path $targetPath | Out-Host
          Write-Host "BITSReference4_0.dll written to $targetPath"

      - name: Restore NuGet packages
        run: msbuild PSWindowsUpdate.sln /t:Restore /p:Configuration=Release

      - name: Build (Release)
        run: >
          msbuild PSWindowsUpdate.sln
          /p:Configuration=Release
          /p:Platform="Any CPU"
          /m

      - name: Prepare release package
        shell: powershell
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $requiredFiles = @(
            @{ Source = "PSWindowsUpdate.nuspec"; Dest = "PSWindowsUpdate.nuspec" },
            @{ Source = "PSWindowsUpdate.psm1"; Dest = "PSWindowsUpdate.psm1" },
            @{ Source = "PSWUSettings.xml.tmp"; Dest = "PSWUSettings.xml.tmp" },
            @{ Source = "bin\Release\PSWindowsUpdate.dll"; Dest = "PSWindowsUpdate.dll" },
            @{ Source = "PSWindowsUpdate.dll-Help.xml"; Dest = "PSWindowsUpdate.dll-Help.xml" },
            @{ Source = "PSWindowsUpdate.Format.ps1xml"; Dest = "PSWindowsUpdate.Format.ps1xml" },
            @{ Source = "PSWindowsUpdate.psd1"; Dest = "PSWindowsUpdate.psd1" }
          )

          foreach ($file in $requiredFiles) {
            $sourcePath = Join-Path $env:GITHUB_WORKSPACE $file.Source
            if (-not (Test-Path $sourcePath)) {
              throw "Missing required package file: $sourcePath"
            }

            $destPath = Join-Path $packageDir $file.Dest
            $destParent = Split-Path $destPath -Parent
            New-Item -ItemType Directory -Force -Path $destParent | Out-Null
            if (-not (Test-Path $destParent)) {
              throw "Failed to create package destination directory: $destParent"
            }
            Copy-Item -Path $sourcePath -Destination $destPath -Force
          }

          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $zipName = "PSWindowsUpdate-$env:GITHUB_REF_NAME.zip"
            $zipPath = Join-Path $env:GITHUB_WORKSPACE $zipName

            if (Test-Path $zipPath) {
              Remove-Item $zipPath -Force
            }

            Compress-Archive -Path "$packageDir\*" -DestinationPath $zipPath -Force
            "PACKAGE_ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: package

      - name: Upload release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: ${{ env.PACKAGE_ZIP_PATH }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download release ZIP
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
